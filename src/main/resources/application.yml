server:
  port: 8081
  servlet:
    context-path: /api

spring:
  config:
    import: optional:classpath:application-dev.yml
  profiles:
    active:
    - dev

    # springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.gen.ai.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn

# application.yml
app:
  storage:
    # root: ${user.home}/data/gen-ai-agent  # 统一根目录，支持跨平台
    root: ./data/gen-ai-agent  # 统一根目录，支持跨平台
    chat-history: ${app.storage.root}/history
    rag-docs: ${app.storage.root}/knowledge
    vector-db: ${app.storage.root}/vector-store
    # RAG相似度阈值
  rag:
    similarity-threshold: 0.5
  security:
    shadow-words-base64: # 影子词库

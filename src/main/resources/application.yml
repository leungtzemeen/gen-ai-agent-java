server:
  port: 8081
  servlet:
    context-path: /api
  # Manus SSE：生产若经 Nginx 反代，请对该 location 关闭 proxy_buffering（否则仍可能整段缓冲）

wiselink:
  # 拨码开关：ollama (本地), dashscope (百炼), deepseek (深度求索)
  active-brain: deepseek
  manus:
    # noop：首步前不额外调用 LLM；llm：同 ChatModel 无 Memory 短调用，产出 SSE phase=PLAN_SNIPPET
    planner: noop
    # single-call：一次 ChatClient.call 内层跑满工具（默认）；react：think+act 各一轮，多外层步可观测
    step-executor: react
    # Manus HTTP 外层步上限（仅服务端配置；GET /ai/chat/manus 不再接受 maxSteps 查询参数）
    max-steps: 10

spring:
  config:
    import: optional:classpath:application-dev.yml
  profiles:
    active:
      - dev
  # 三个模型的配置可以共存，但 Bean 的生命周期会被开关物理阻断
  ai:
    dashscope:
      # 必须通过环境变量注入，禁止在 yml 中填写明文密钥（见 README「配置说明」）
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
    # 本地 Ollama（WiseLink 本地大脑）
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b
          # model: qwen2.5:3b
          # model: qwen2.5:7b-instruct-q4_K_M
    openai:
      api-key: ${AI_DEEPSEEK_API_KEY}
      # 厂商站点 https://deepseek.com ；REST 兼容基址须使用 api 子域
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat

    # MCP Client 配置
    # 开发环境覆盖项（由 application.yml 以 optional 方式导入）
    #
    # WiseLink 3.0 — MCP Client：仅 Stdio（SSE/Streamable-HTTP 自动配置已在入口类排除）
    # 文档：https://docs.spring.io/spring-ai/reference/api/mcp/mcp-client-boot-starter-docs.html
    #
    # 点火测试：连接名 map-server，通过 STDIO 拉起外部 MCP（此处用官方 @modelcontextprotocol/server-filesystem
    # 仅作可运行演示；真实地图 MCP 上线后替换 command/args 即可）。
    # 需本机已安装 Node.js。Windows：npx 须 cmd.exe /c。macOS/Linux：可改为 command: npx，args 去掉 /c。
    # 沙箱目录与 app.storage.mcp-map-sandbox 及 args 末项一致；由 StorageConfig 在 MCP Bean 之前创建。
    # 启动成功后日志检索：「[WiseLink-MCP] 已发现并注册外部工具列表」。
    # 若暂不联调，将 enabled 改为 false（集成测试已强制关闭 MCP，见 src/test/resources/application.properties）。
    mcp:
      client:
        enabled: true
        name: wiselink-mcp-client
        type: SYNC
        # 含 MCP initialize 等阶段，过大会阻塞启动；过短可能导致慢速 npx 首次拉包失败（见 McpClientConfig 容错）
        request-timeout: 10s
        toolcallback:
          enabled: true
        stdio:
          connections:
            map-server:
              command: cmd.exe
              args:
                - /c
                - npx
                - "-y"
                # - "@modelcontextprotocol/server-filesystem"
                - "@amap/amap-maps-mcp-server"
                - ${app.storage.mcp-map-sandbox}
              env:
                # 这里的 AMAP_MAPS_API_KEY 是 Node.js 脚本需要的变量名
                # ${AMAP_MAP_KEY} 是你操作系统中配置的环境变量名
                AMAP_MAPS_API_KEY: ${AMAP_MAP_KEY}

            wiselink-mcp-ecosystem:
              command: java
              args:
                - "-jar"
                # 自行修改成wiselink-mcp-ecosystem-0.1.0-SNAPSHOT.jar所在的路径
                - "${WISELINK_MCP_WORKSPACE_ROOT}/target/wiselink-mcp-ecosystem-0.1.0-SNAPSHOT.jar"
              env:
                # 子进程工作区根；ecosystem 日志为 {根}/logs/ecosystem.log。未设 OS 环境变量时与 app.storage.root 一致
                WISELINK_MCP_WORKSPACE_ROOT: ${WISELINK_MCP_WORKSPACE_ROOT:${app.storage.root}}

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan: com.gen.ai.web
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn

# ===================================================================
# 🏆 WiseLink 3.0 完全体·微内核分布式网关核心治理资产
# ===================================================================
app:
  # 1. 统一多租户存储/索引物理阵地（包含 RAG 硬核阈值）
  storage:
    root: ./data                                # 统一根目录，支持跨平台路径无感迁移
    chat-history: ${app.storage.root}/history   # 历史会话滚动落盘物理仓
    rag-docs: ${app.storage.root}/knowledge     # 60条手机真理文件存放专区
    vector-db: ${app.storage.root}/vector-store # 内存级 SimpleVectorStore 磁盘持久化快照点
    mcp-map-sandbox: ${app.storage.root}/mcp-map-sandbox # 高德 MCP stdio 沙箱（与 spring.ai.mcp...map-server.args 末项一致）

    # 钱包底噪限流防御闸门 (Token 优化关键卡位)
    max-messages: 8                           # 历史记忆滑动窗口上限
    last-n-history: 12                        # 磁盘持久化检索深度上限
    max-observation-chars: 8000               # 单次工具返回最大字符上限
    max-tool-invocations-per-request: 10       # 单请求所有工具真实执行次数之和上限
    rag-top-k: 2                              # RAG 知识检索强力限流缩容：仅吐 2 条黄金背景知识
    similarity-threshold: 0.5                 # 【资产收拢】：余弦相似度置信度阈值，低于 0.5 自动过滤
    product-query-max-results: 5              # 商品查询工具最多返回条数

    
  # 2. 跨模型通用·微内核插拔式数据源开关
  datasource:
    type: json                                # [json | mysql] 应急面试 Mock / 生产级无感热切换

  # 3. 跨模型通用·知识库热开机提取厂格式开关
  knowledge:
    type: json                                # [json | markdown] 控制开机解析器插槽策略
    default-biz-category: 手机                 # 导入/预热时默认类目（JSON 过滤等）
    # JSON 行级增量依赖 metadata：goods_id + update_time（或 updateTime）；缺 update_time 时每次导入会删旧重写该 goods_id

  # 4. 跨模型通用·全网关层安全合容风控防线
  security:
    shadow-words-base64: # 影子词库
      - "Y2hhdGfntK8="                         # 例子：标准的 YAML 数组格式，可以无限向下追加多条 Base64 影子词
      - "ZGVlcHNlZWs="                         # 只要有需要，直接用 - 开行平铺，Jackson 100% 自动吃进


